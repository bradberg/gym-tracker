<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Gym Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: #334155;
      --shadow: 0 10px 24px rgba(0,0,0,.25);
      --radius: 14px;
      --tap: 48px;
      --free: #2563eb;
      --machine: #dc2626;
      --home: #facc15;
      --home-text: #1f2937;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body { padding: 12px; }
    .app { max-width: 860px; margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(15,23,42,.96), rgba(15,23,42,.88));
      backdrop-filter: blur(8px);
      padding: 8px 0 12px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.5rem;
      text-align: center;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      min-height: var(--tap);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: .95rem;
      cursor: pointer;
    }
    button.warn { background: transparent; color: #fecaca; border-color: #7f1d1d; }

    .legend {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: .85rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
      line-height: 1;
      border: 1px solid rgba(255,255,255,.12);
    }
    .badge.free { background: var(--free); color: white; }
    .badge.machine { background: var(--machine); color: white; }
    .badge.home { background: var(--home); color: var(--home-text); }

    .workout {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .workout-header {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 0;
      border-radius: 0;
      text-align: left;
    }
    .workout-title { font-size: 1.08rem; font-weight: 700; }
    .chev { color: var(--muted); font-size: 1.2rem; transition: transform .15s ease; }
    .workout-body { display: none; padding: 12px; border-top: 1px solid var(--border); }
    .workout.open .workout-body { display: block; }
    .workout.open .chev { transform: rotate(180deg); }

    .exercise {
      border: 1px solid var(--border);
      background: #0b1220;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .exercise-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
    }
    .name-btn {
      min-height: var(--tap);
      background: transparent;
      border: 0;
      padding: 0;
      text-align: left;
      color: var(--text);
      width: 100%;
      display: block;
    }
    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
    }
    .name-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .name-text {
      font-size: 1rem;
      font-weight: 650;
    }

    .set-boxes {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .set-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      position: relative;
      overflow: hidden;
    }
    .set-pill input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .set-pill span { font-size: .85rem; color: var(--muted); }
    .set-pill:has(input:checked) { background: var(--accent); border-color: var(--accent); }
    .set-pill:has(input:checked) span { color: #052e16; font-weight: 700; }

    .exercise-body {
      display: none;
      padding: 0 10px 10px;
      border-top: 1px solid rgba(148,163,184,.15);
    }
    .exercise.open .exercise-body { display: block; }

    .section-title {
      color: var(--muted);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin: 12px 0 6px;
    }
    .exercise-body p,
    .exercise-body ul {
      margin-top: 0;
      margin-bottom: 10px;
    }
    .exercise-body ul {
      padding-left: 18px;
    }
    .exercise-body li {
      margin-bottom: 6px;
    }

    .meta-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: end;
      margin-top: 8px;
    }
    .two-col {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 160px;
      align-items: end;
      margin-top: 8px;
    }
    label {
      font-size: .82rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    input[type="number"], select {
      width: 100%;
      min-height: var(--tap);
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 1rem;
    }

    .footer-note {
      color: var(--muted);
      font-size: .85rem;
      padding: 6px 2px 24px;
      text-align: center;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .exercise-head {
        grid-template-columns: 1fr;
      }
      .name-row {
        align-items: flex-start;
      }
      .name-left {
        flex-wrap: nowrap;
      }
      .meta-grid, .two-col {
        grid-template-columns: 1fr;
      }
      .set-boxes {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Gym Tracker</h1>
      <div class="toolbar">
        <button id="collapseAllBtn">Collapse all</button>
        <button class="warn" id="resetWeekBtn">Reset checkmarks</button>
      </div>
    </div>

    <div class="legend">
      <span><span class="badge free">F</span> Free weights</span>
      <span><span class="badge machine">M</span> Machine</span>
      <span><span class="badge home">H</span> At home / bodyweight</span>
    </div>

    <div id="workouts"></div>

    <div class="footer-note">
      Saved on this device. If you clear browser data, your checkmarks and saved values may reset.
    </div>
  </div>

  <script>
    const appKey = 'ymca-phase1-tracker-v2';

    const warmup = {
      name: 'Warm-up Cardio',
      tags: ['H'],
      sets: 1,
      summary: '8 to 10 min',
      reps: '8 to 10 minutes',
      details: 'Start each lifting day with easy cardio. Goal is to warm up, not gas yourself.',
      info: [
        'Pick bike, elliptical, or incline treadmill walk.',
        'Easy pace. You should still be able to talk.',
        'Use this to loosen up before lifting.'
      ],
      cardioLog: true
    };

    const data = [
      {
        id: 'lift-a',
        title: 'Lift A',
        exercises: [
          { id: 'warmup-a', ...warmup },
          {
            id: 'leg-press',
            name: 'Leg Press',
            tags: ['M'],
            sets: 3,
            summary: '3 x 10',
            reps: '3 sets of 10',
            details: 'Feet shoulder-width on platform. Lower until knees are bent comfortably, then press back up. Keep lower back against the pad.',
            info: [
              'Set feet about shoulder width.',
              'Lower under control until the knee bend feels comfortable.',
              'Press back up without snapping knees locked.',
              'If the knee feels weird, shorten the depth.'
            ]
          },
          {
            id: 'chest-press',
            name: 'Chest Press or DB Bench',
            tags: ['M', 'F'],
            sets: 3,
            summary: '3 x 8 to 10',
            reps: '3 sets of 8 to 10',
            details: 'Push weight away from your chest. Lower slowly. Keep shoulders down and controlled.',
            info: [
              'Machine version is easiest to learn again.',
              'If using dumbbells, feet flat and wrists stacked over elbows.',
              'Do not bounce at the bottom.'
            ]
          },
          {
            id: 'seated-row',
            name: 'Seated Row',
            tags: ['M'],
            sets: 3,
            summary: '3 x 10',
            reps: '3 sets of 10',
            details: 'Pull handle toward lower ribs. Squeeze shoulder blades back. No body swinging.',
            info: [
              'Start with arms long.',
              'Pull elbows back toward your sides.',
              'Pause briefly, then return slow.'
            ]
          },
          {
            id: 'rdl',
            name: 'DB Romanian Deadlift',
            tags: ['F'],
            sets: 2,
            summary: '2 x 10',
            reps: '2 sets of 10',
            details: 'Hold dumbbells in front of thighs. Soft knees. Push hips back, keep back flat, then stand tall again.',
            info: [
              'This is a hip hinge, not a squat.',
              'Dumbbells stay close to legs.',
              'You should feel hamstrings and glutes, not low back.'
            ]
          },
          {
            id: 'step-ups',
            name: 'Low Step-Ups',
            tags: ['H'],
            sets: 2,
            summary: '2 x 8 each leg',
            reps: '2 sets of 8 each leg',
            details: 'Use a low step. Step up, stand tall, step down under control. Use support if needed.',
            info: [
              'Keep the step low to start.',
              'Try not to launch off the back leg.',
              'Slow and controlled is the point here.'
            ]
          },
          {
            id: 'plank',
            name: 'Plank',
            tags: ['H'],
            sets: 3,
            summary: '3 x 20 to 30 sec',
            reps: '3 rounds of 20 to 30 seconds',
            details: 'Elbows under shoulders. Body straight. Squeeze abs and glutes. Do not let hips sag.',
            info: [
              'If full plank is too much, elevate hands on bench.',
              'Think straight line from shoulders to heels.'
            ]
          }
        ]
      },
      {
        id: 'cardio-1',
        title: 'Cardio 1',
        exercises: [
          {
            id: 'steady-cardio-1',
            name: 'Bike, Elliptical, or Incline Walk',
            tags: ['H'],
            sets: 1,
            summary: '20 to 35 min',
            reps: '20 to 35 minutes',
            details: 'Easy to moderate pace. You should still be able to talk while doing it.',
            info: [
              'This is not a test day.',
              'Goal is to build engine without impact.',
              'If legs feel beat up, keep it easy and shorter.'
            ],
            cardioLog: true
          }
        ]
      },
      {
        id: 'lift-b',
        title: 'Lift B',
        exercises: [
          { id: 'warmup-b', ...warmup },
          {
            id: 'goblet-squat',
            name: 'Goblet Squat to Box/Bench',
            tags: ['F'],
            sets: 3,
            summary: '3 x 8 to 10',
            reps: '3 sets of 8 to 10',
            details: 'Hold one dumbbell at your chest. Sit back to a box or bench, lightly touch, then stand up.',
            info: [
              'Use the box or bench to control depth.',
              'Knees track over feet.',
              'Sit back, do not dive straight down.',
              'If knee feels off, use a higher box.'
            ]
          },
          {
            id: 'lat-pulldown',
            name: 'Lat Pulldown',
            tags: ['M'],
            sets: 3,
            summary: '3 x 10',
            reps: '3 sets of 10',
            details: 'Pull the bar to upper chest with chest up. Control it back overhead. Do not pull behind the neck.',
            info: [
              'Start with shoulders down, not shrugged.',
              'Think elbows down toward ribs.',
              'No jerking or body rocking.'
            ]
          },
          {
            id: 'shoulder-press',
            name: 'Seated DB Shoulder Press',
            tags: ['F'],
            sets: 2,
            summary: '2 x 10',
            reps: '2 sets of 10',
            details: 'Start dumbbells by shoulders and press overhead. Lower under control.',
            info: [
              'Stay tall in the seat.',
              'Do not over-arch the low back.',
              'Machine shoulder press is a fine swap.'
            ]
          },
          {
            id: 'hamstring-curl',
            name: 'Hamstring Curl',
            tags: ['M'],
            sets: 3,
            summary: '3 x 10 to 12',
            reps: '3 sets of 10 to 12',
            details: 'Bend the knees to pull the pad in, then return slowly. You should feel this in the back of the thighs.',
            info: [
              'Use seated or lying machine.',
              'Control the lowering part.',
              'No need to go heavy early.'
            ]
          },
          {
            id: 'glute-bridge',
            name: 'Glute Bridge / Hip Thrust',
            tags: ['H'],
            sets: 2,
            summary: '2 x 12',
            reps: '2 sets of 12',
            details: 'Feet flat. Drive hips up and squeeze glutes at the top. Avoid cranking low back.',
            info: [
              'Bodyweight is enough to start.',
              'Pause briefly at the top.',
              'Focus on glutes, not low back.'
            ]
          },
          {
            id: 'dead-bug',
            name: 'Dead Bug or Side Plank',
            tags: ['H'],
            sets: 3,
            summary: '2 to 3 rounds',
            reps: '2 to 3 rounds',
            details: 'Pick one. Dead bug: opposite arm and leg extend while low back stays down. Side plank: straight body line, hold steady.',
            info: [
              'Dead bug is usually the easier starting point.',
              'For side plank, keep elbow under shoulder.',
              'Core should feel stable, not shaky chaos.'
            ]
          }
        ]
      },
      {
        id: 'cardio-2',
        title: 'Cardio 2',
        exercises: [
          {
            id: 'steady-cardio-2',
            name: 'Bike, Elliptical, or Incline Walk',
            tags: ['H'],
            sets: 1,
            summary: '20 to 35 min',
            reps: '20 to 35 minutes',
            details: 'Easy to moderate pace. You should still be able to talk while doing it.',
            info: [
              'Same as Cardio 1.',
              'Pick whatever feels best on the knee and shins.',
              'This should help recovery, not bury you.'
            ],
            cardioLog: true
          }
        ]
      },
      {
        id: 'lift-c',
        title: 'Lift C',
        exercises: [
          { id: 'warmup-c', ...warmup },
          {
            id: 'split-squat',
            name: 'Assisted Split Squat / Reverse Lunge',
            tags: ['H'],
            sets: 2,
            summary: '2 x 8 each leg',
            reps: '2 sets of 8 each leg',
            details: 'One foot forward, one back. Lower under control and stand up. Hold support if needed.',
            info: [
              'Reverse lunge is often a little friendlier on knees.',
              'Keep the range shallow at first if needed.',
              'Balance support is fine.'
            ]
          },
          {
            id: 'incline-press',
            name: 'Incline DB Bench / Machine Press',
            tags: ['F', 'M'],
            sets: 3,
            summary: '3 x 8 to 10',
            reps: '3 sets of 8 to 10',
            details: 'Press from a slight incline. Lower slow and controlled.',
            info: [
              'Same idea as chest press, just a different angle.',
              'Do not rush the lowering part.'
            ]
          },
          {
            id: 'row-c',
            name: 'Cable or Machine Row',
            tags: ['M'],
            sets: 3,
            summary: '3 x 10',
            reps: '3 sets of 10',
            details: 'Pull toward torso and squeeze shoulder blades back. No jerking.',
            info: [
              'Chest up.',
              'Elbows drive back.',
              'Return slow.'
            ]
          },
          {
            id: 'leg-curl-ext',
            name: 'Leg Curl or Light Leg Extension',
            tags: ['M'],
            sets: 2,
            summary: '2 x 12',
            reps: '2 sets of 12',
            details: 'Choose curl or light extension. If extension bugs the knee, skip it.',
            info: [
              'Smooth reps only.',
              'Go light on extension early.'
            ]
          },
          {
            id: 'calf-raises',
            name: 'Calf Raises',
            tags: ['H', 'M'],
            sets: 3,
            summary: '3 x 12 to 15',
            reps: '3 sets of 12 to 15',
            details: 'Rise onto toes, pause, lower slowly.',
            info: [
              'Machine or bodyweight both work.',
              'Slow lowering is useful for your lower legs.'
            ]
          },
          {
            id: 'pallof',
            name: 'Pallof Press / Cable Core',
            tags: ['M'],
            sets: 3,
            summary: '2 to 3 sets',
            reps: '2 to 3 sets',
            details: 'Stand sideways to cable, press straight out, resist rotation.',
            info: [
              'This is anti-rotation core work.',
              'Keep hips and shoulders square.'
            ]
          }
        ]
      }
    ];

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(appKey)) || { checks: {}, weights: {}, cardio: {} };
      } catch {
        return { checks: {}, weights: {}, cardio: {} };
      }
    }

    function saveState() {
      localStorage.setItem(appKey, JSON.stringify(state));
    }

    const state = loadState();
    if (!state.checks) state.checks = {};
    if (!state.weights) state.weights = {};
    if (!state.cardio) state.cardio = {};

    function badgeClass(tag) {
      if (tag === 'F') return 'free';
      if (tag === 'M') return 'machine';
      return 'home';
    }

    function tagBadges(tags = []) {
      return tags.map(tag => `<span class="badge ${badgeClass(tag)}">${tag}</span>`).join('');
    }

    function cardioFields(workout, ex) {
      const key = `${workout.id}.${ex.id}`;
      const saved = state.cardio[key] || {};
      return `
        <div class="section-title">Cardio log</div>
        <div class="meta-grid">
          <div>
            <label for="type-${workout.id}-${ex.id}">Type</label>
            <select id="type-${workout.id}-${ex.id}" data-cardio-type="${key}">
              ${['', 'Bike', 'Elliptical', 'Incline Treadmill'].map(opt => `
                <option value="${opt}" ${saved.type === opt ? 'selected' : ''}>${opt || 'Select type'}</option>
              `).join('')}
            </select>
          </div>
          <div>
            <label for="time-${workout.id}-${ex.id}">Time (min)</label>
            <input id="time-${workout.id}-${ex.id}" type="number" step="1" inputmode="numeric" placeholder="0" value="${saved.time ?? ''}" data-cardio-time="${key}">
          </div>
          <div>
            <label for="speed-${workout.id}-${ex.id}">Speed / level</label>
            <input id="speed-${workout.id}-${ex.id}" type="text" placeholder="ex: 3.2 or level 5" value="${saved.speed ?? ''}" data-cardio-speed="${key}">
          </div>
        </div>
      `;
    }

    function render() {
      const container = document.getElementById('workouts');
      container.innerHTML = data.map(workout => `
        <section class="workout" id="${workout.id}">
          <button class="workout-header" data-toggle-workout="${workout.id}">
            <div class="workout-title">${workout.title}</div>
            <div class="chev">▾</div>
          </button>
          <div class="workout-body">
            ${workout.exercises.map(ex => `
              <div class="exercise" id="${workout.id}-${ex.id}">
                <div class="exercise-head">
                  <button class="name-btn" data-toggle-exercise="${workout.id}-${ex.id}">
                    <div class="name-row">
                      <div class="name-left">
                        ${tagBadges(ex.tags)}
                        <span class="name-text">${ex.name}</span>
                      </div>
                      <div class="set-boxes">
                        ${Array.from({length: ex.sets}, (_, i) => {
                          const key = `${workout.id}.${ex.id}.set${i+1}`;
                          return `
                            <label class="set-pill" onclick="event.stopPropagation()">
                              <input type="checkbox" data-check="${key}" ${state.checks[key] ? 'checked' : ''}>
                              <span>${i+1}</span>
                            </label>
                          `;
                        }).join('')}
                      </div>
                    </div>
                  </button>
                </div>
                <div class="exercise-body">
                  <div class="section-title">Target</div>
                  <p>${ex.reps}</p>
                  <div class="section-title">Notes</div>
                  <p>${ex.details}</p>
                  <div class="section-title">How to do it</div>
                  <ul>
                    ${ex.info.map(item => `<li>${item}</li>`).join('')}
                  </ul>
                  ${ex.cardioLog ? cardioFields(workout, ex) : `
                    <div class="two-col">
                      <div></div>
                      <div>
                        <label for="w-${workout.id}-${ex.id}">Last weight used</label>
                        <input id="w-${workout.id}-${ex.id}" type="number" step="5" inputmode="decimal" placeholder="0" value="${state.weights[`${workout.id}.${ex.id}`] ?? ''}" data-weight="${workout.id}.${ex.id}">
                      </div>
                    </div>
                  `}
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `).join('');

      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll('[data-toggle-workout]').forEach(btn => {
        btn.onclick = () => {
          document.getElementById(btn.dataset.toggleWorkout).classList.toggle('open');
        };
      });

      document.querySelectorAll('[data-toggle-exercise]').forEach(btn => {
        btn.onclick = () => {
          document.getElementById(btn.dataset.toggleExercise).classList.toggle('open');
        };
      });

      document.querySelectorAll('[data-check]').forEach(box => {
        box.onchange = () => {
          state.checks[box.dataset.check] = box.checked;
          saveState();
        };
      });

      document.querySelectorAll('[data-weight]').forEach(input => {
        input.oninput = () => {
          state.weights[input.dataset.weight] = input.value;
          saveState();
        };
      });

      document.querySelectorAll('[data-cardio-type]').forEach(input => {
        input.onchange = () => {
          const key = input.dataset.cardioType;
          state.cardio[key] = state.cardio[key] || {};
          state.cardio[key].type = input.value;
          saveState();
        };
      });

      document.querySelectorAll('[data-cardio-time]').forEach(input => {
        input.oninput = () => {
          const key = input.dataset.cardioTime;
          state.cardio[key] = state.cardio[key] || {};
          state.cardio[key].time = input.value;
          saveState();
        };
      });

      document.querySelectorAll('[data-cardio-speed]').forEach(input => {
        input.oninput = () => {
          const key = input.dataset.cardioSpeed;
          state.cardio[key] = state.cardio[key] || {};
          state.cardio[key].speed = input.value;
          saveState();
        };
      });
    }

    document.getElementById('collapseAllBtn').onclick = () => {
      document.querySelectorAll('.workout').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.exercise').forEach(el => el.classList.remove('open'));
    };

    document.getElementById('resetWeekBtn').onclick = () => {
      if (!confirm('Reset all set checkmarks? Saved weights and cardio notes will stay.')) return;
      state.checks = {};
      saveState();
      render();
    };

    render();
  </script>
</body>
</html>
